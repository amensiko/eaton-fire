
#Information for downloading data from PRISM's Web Service
data_download:
  base_url: "https://services.nacse.org/prism/data/get"
  
  region: "us"
  resolution: "800m"

  daily:
    save_loc: "data/raw/daily"
    start_date: "2000-01-03"
    end_date: "2000-01-04"
    wx_vars: ["ppt", "tmin", "tmax", "tmean", "tdmean", "vpdmin", "vpdmax"]
  
  monthly:
    save_loc: "data/raw/monthly"
    year_range: [2000, 2025]
    months: ["01", "02", "03", "10", "11", "12"]
    wx_vars: ["ppt", "tmean", "vpdmax"]